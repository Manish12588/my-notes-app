# .github/workflows/infra-destroy.yml
name: Destroy Infrastructure

on:
  workflow_dispatch:              # ✅ manual trigger only — never auto destroy!
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        type: string

permissions:
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest

    # ✅ Safety check — only runs if user typed "destroy"
    if: ${{ github.event.inputs.confirm == 'destroy' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/

      - name: Terraform Plan Destroy    # ✅ show what will be destroyed
        run: terraform plan -destroy
        working-directory: terraform/

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: terraform/

      - name: Confirm Destruction
        run: |
          echo "✅ Infrastructure destroyed successfully!"
          echo "💰 All AWS resources terminated — billing stopped"